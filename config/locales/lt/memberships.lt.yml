lt:
  memberships: &memberships
    label: &label Komandos nariai
    singular: Komandos narys
    navigation:
      label: *label
      icon: fal fa-users ti ti-flag-alt
    breadcrumbs:
      label: *label
    buttons: &buttons
      edit: Nustatymai
      show: Informacija
      resend: Siųsti iš naujo
      update: Atnaujinti narystę
      demote: Atimti administratoriaus teises
      promote: Suteikti administratoriaus teises
      destroy: Pašalinti iš komandos
      destroy_own: Palikti komandą
      reinvite: Pakviesti iš naujo
      confirmations:
        destroy: Ar tikrai norite pašalinti %{membership_name} iš %{team_name}?
        destroy_own: Ar tikrai norite pasitraukti iš %{team_name}? To nebus galima atšaukti.
        reinvite: Ar tikrai norite iš naujo pakviesti %{membership_name} į %{team_name}?
    fields: &fields
      id:
        _: &id Narystės ID
        label: *id
        heading: *id
        api_title: *id
        api_description: *id
      user_id:
        name: &user_id Vartotojo ID
        heading: *user_id
        api_title: *user_id
        api_description: *user_id
      team_id:
        name: &team_id Komandos ID
        heading: *team_id
        api_title: *team_id
        api_description: *team_id
      invitation_id:
        name: &invitation_id Kvietimo ID
        heading: *invitation_id
        api_title: *invitation_id
        api_description: *invitation_id
      name:
        name: &name Pilnas vardas
        heading: *name
        api_title: *name
        api_description: *name
      user_first_name:
        name: &user_first_name Vardas
        label: *user_first_name
        heading: *user_first_name
        api_title: *user_first_name
        api_description: *user_first_name
      user_last_name:
        name: &user_last_name Pavardė
        label: *user_last_name
        heading: *user_last_name
        api_title: *user_last_name
        api_description: *user_last_name
      user_profile_photo_id:
        name: &user_profile_photo_id Profilio nuotrauka
        label: *user_profile_photo_id
        heading: *user_profile_photo_id
        api_title: *user_profile_photo_id
        api_description: *user_profile_photo_id
      user_profile_photo:
        name: &user_profile_photo Profilio nuotrauka
        label: *user_profile_photo
        heading: *user_profile_photo
        api_title: *user_profile_photo
        api_description: *user_profile_photo
      user_email:
        name: &user_email Vartotojo el. paštas
        heading: *user_email
        api_title: *user_email
        api_description: *user_email
      role_ids:
        name: &roles Specialios teisės
        label: *roles
        heading: *roles
        api_title: *roles
        api_description: *roles
        options:
          default:
            label: Žiūrovas
            description: Gali tik peržiūrėti komandos duomenis
          admin:
            label: Komandos administratorius
            description: Administratoriai gali valdyti atsiskaitymą ir kitų narių teises.
          editor:
            label: Redaktorius
            description: Gali redaguoti visus komandos išteklius.
        none: Žiūrovas
      created_at:
        _: &created_at Sukurta
        heading: *created_at
        api_title: *created_at
        api_description: *created_at
      updated_at:
        _: &updated_at Atnaujinta
        heading: *updated_at
        api_title: *updated_at
        api_description: *updated_at
    index:
      section: "%{team_name} komandos nariai"
      contexts:
        team:
          header: Komandos nariai
          description: Žemiau pateikiami komandos nariai. Taip pat galite pakviesti naujų narių.
          fields: *fields
      buttons: *buttons
    tombstones:
      contexts:
        team:
          header: Buvę komandos nariai
          description: Šie asmenys buvo pašalinti iš %{team_name}, tačiau galite valdyti jų profilius.
      buttons: *buttons
    form: &form
      grant_privileges_of: Suteikti %{role_key} teises
      buttons: *buttons
      fields: *fields
    edit:
      section: "%{membership_name} komandoje %{team_name}"
      header: Atnaujinti narystės nustatymus
      description: Žemiau galite redaguoti %{memberships_possessive} narystės nustatymus komandoje %{team_name}.
      grant_privileges_of: Suteikti %{role_key} teises
      remove_header: Pašalinti komandos narį
      remove_description: Pašalinus %{membership_name} užduotys nebus pašalintos. Galėsite jas priskirti kitam nariui ir vėliau vėl pakviesti.
      buttons: *buttons
    show:
      section: "%{memberships_possessive} narystė komandoje %{team_name}"
      header: Narystės informacija
      invitation_header: Kvietimo informacija
      tombstone_header: Buvęs komandos narys
      description: Žemiau pateikiama %{memberships_possessive} narystės komandoje %{team_name} informacija.
      buttons: *buttons
      fields: *fields
    notifications:
      updated: Narystė sėkmingai atnaujinta.
      destroyed: Vartotojas sėkmingai pašalintas iš komandos.
      no_members: Dar neturite komandos narių! Pradėkite siųsdami kvietimą.
      cant_demote: Atsiprašome, negalite atimti paskutinio administratoriaus teisių. Pirmiau padarykite ką nors kitu administratoriumi.
      cant_remove: Atsiprašome, negalite pašalinti paskutinio administratoriaus. Pirmiau padarykite ką nors kitu administratoriumi.
      you_removed_yourself: Sėkmingai pasitraukėte iš %{team_name}.
      reinvited: Vartotojas sėkmingai pakviestas iš naujo. Jis gaus el. laišką.
  account:
    memberships: *memberships
  activerecord:
    attributes:
      memberships:
        user_first_name: *user_first_name
        user_last_name: *user_last_name
