lt:
  users: &users
    label: &label Vartotojai
    breadcrumbs:
      label: *label
    buttons: &buttons
      update_profile: Atnaujinti profilį
      update_email_and_password: Atnaujinti el. paštą ir slaptažodį
    edit:
      section: "%{users_possessive} profilis"
      profile:
        header: Atnaujinti profilį
        description: Čia galite atnaujinti savo rodomą vardą ir laiko juostą.
      preferences:
        header: Atnaujinti nuostatas
        description: Čia galite atnaujinti šios programos išvaizdą šiame įrenginyje.
      email_and_password:
        header: Atnaujinti el. pašto adresą ir slaptažodį
        description: Pakeitus šiuos duomenis, atsiųsime patvirtinimą el. paštu.
        new_password: Jei nenorite keisti slaptažodžio, palikite šiuos du laukus tuščius.
        current_password: Saugumo sumetimais turite patvirtinti dabartinį slaptažodį.
        confirm_new_password: Pakartokite naują slaptažodį
      two_factor:
        header: Dviejų veiksnių autentifikacija
        description_enabled: DVA šiuo metu įjungta jūsų paskyroje.
        description_disabled: Galite padidinti paskyros saugumą įjungę dviejų veiksnių autentifikaciją.
        verification_fail: Patvirtinimas nepavyko. Bandykite įjungti iš naujo ir įsitikinkite, kad nuskaitėte naują QR kodą.
        verification_success: Pavyko! Dėkojame už patvirtinimą. DVA dabar įjungta.
        warning: "Norint įjungti DVA, <strong>privalote</strong> įdiegti autentifikatoriaus programą ir <strong>įvesti patvirtinimo kodą žemiau</strong>. DVA nebus įjungta tol, kol to nedarysite."
        instructions: "Įdiekite <a href='https://authy.com/download/' target='_blank'>Authy</a> arba <a href='https://support.google.com/accounts/answer/1066447'>Google Authentication</a> savo telefone ir nuskaitykite žemiau rodomą QR kodą."
        recovery_codes: "Taip pat galite pasidaryti šių atkūrimo kodų kopiją. Kiekvienas gali padėti vieną kartą atgauti prieigą prie paskyros."
        buttons:
          enable: Įjungti
          disable: Išjungti
          verify: Patvirtinti
          confirmations:
            disable: "Ar tikrai norite išjungti DVA?"
      buttons: *buttons
    notifications:
      updated: Vartotojas sėkmingai atnaujintas.
    fields: &fields
      id:
        _: &id Komandos ID
        label: *id
        heading: *id
        api_title: *id
        api_description: *id
      name:
        heading: Vardas
      first_name:
        _: &first_name Vardas
        label: *first_name
        heading: *first_name
        api_title: *first_name
        api_description: *first_name
      last_name:
        _: &last_name Pavardė
        label: *last_name
        heading: *last_name
        api_title: *last_name
        api_description: *last_name
      email:
        _: &email El. pašto adresas
        label: *email
        heading: *email
        api_title: *email
        api_description: *email
      time_zone:
        _: &time_zone Jūsų laiko juosta
        label: *time_zone
        heading: *time_zone
        api_title: *time_zone
        api_description: *time_zone
      profile_photo_id:
        _: &profile_photo_id Profilio nuotrauka
        label: *profile_photo_id
        heading: *profile_photo_id
        api_title: *profile_photo_id
        api_description: *profile_photo_id
      profile_photo:
        _: &profile_photo Profilio nuotrauka
        label: *profile_photo
        heading: *profile_photo
        api_title: *profile_photo
        api_description: *profile_photo
      current_password:
        label: Dabartinis slaptažodis
      password:
        _: &password Slaptažodis
        label: *password
      password_confirmation:
        _: &password_confirmation Slaptažodžio patvirtinimas
        label: Pakartokite slaptažodį
      otp_attempt:
        _: &otp_attempt Patvirtinimo kodas
        label: *otp_attempt
        heading: *otp_attempt
        api_title: *otp_attempt
        api_description: *otp_attempt
      locale:
        _: &locale Kalba
        label: *locale
        heading: *locale
        api_title: *locale
        api_description: *locale
        help: Pagal numatytuosius nustatymus sąsajos kalba keičiasi pagal komandos kalbos nustatymą, tačiau čia galite nustatyti asmeninę nuostatą.
      color_scheme_preference:
        _: &color_scheme_preference Išvaizda
        label: *color_scheme_preference
        heading: *color_scheme_preference
        api_title: *color_scheme_preference
        api_description: *color_scheme_preference
        options:
          light: Visada šviesus
          dark: Visada tamsus
          system: Kaip sistemoje
        help: Tai keičia tik šio įrenginio išvaizdą.
      created_at:
        _: &created_at Užsiregistravo
        heading: *created_at
        api_title: *created_at
        api_description: *created_at
      updated_at:
        _: &updated_at Atnaujinta
        heading: *updated_at
        api_title: *updated_at
        api_description: *updated_at
    _: &self
      email:
        label: Jūsų el. pašto adresas
      password:
        label: Jūsų slaptažodis
      first_name:
        label: Jūsų vardas
      last_name:
        label: Jūsų pavardė
      otp_attempt:
        label: DVA kodas
        help: Šį kodą rasite autentifikatoriaus programoje.
    self:
      <<: [*self, *fields]
    _1: &sign_up
      password:
        label: Nustatykite slaptažodį
    sign_up:
      <<: [*sign_up, *self, *fields]
    _2: &update_self
      password:
        label: Naujas slaptažodis
    update_self:
      <<: [*update_self, *self, *fields]
    form:
      buttons: *buttons
  account:
    users: *users
  activerecord:
    attributes:
      user:
        first_name: *first_name
        last_name: *last_name
        email: *email
        profile_photo_id: *profile_photo_id
        profile_photo: *profile_photo
        time_zone: *time_zone
        locale: *locale
        password: *password
        password_confirmation: *password_confirmation
        current_password: Dabartinis slaptažodis
        created_at: *created_at
        updated_at: *updated_at
