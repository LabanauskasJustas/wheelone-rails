services:
  postgres:
    image: postgres:14-alpine
    environment:
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: dev.Dockerfile
      args:
        BULLET_TRAIN_VERSION: "1.41.0"
    volumes:
      - .:/rails
      - bundle_cache:/usr/local/bundle
    ports:
      - "3000:3000"
    environment:
      DATABASE_HOST: postgres
      DATABASE_USERNAME: postgres
      REDIS_URL: redis://redis:6379/0
      RAILS_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    stdin_open: true
    tty: true

  # ── Python Vision Service ────────────────────────────────────────────────

  vision-api:
    build:
      context: ../wheelone-python
    ports:
      - "8000:8000"
    env_file:
      - path: ../wheelone-python/.env
        required: false
    environment:
      WHEELONE_REDIS_URL: redis://redis:6379/0
      WHEELONE_RAILS_BASE_URL: http://web:3000
      WHEELONE_CALLBACK_HMAC_SECRET: ${CALLBACK_HMAC_SECRET}
    depends_on:
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  vision-worker:
    build:
      context: ../wheelone-python
    env_file:
      - path: ../wheelone-python/.env
        required: false
    environment:
      WHEELONE_REDIS_URL: redis://redis:6379/0
      WHEELONE_RAILS_BASE_URL: http://web:3000
      WHEELONE_CALLBACK_HMAC_SECRET: ${CALLBACK_HMAC_SECRET}
    depends_on:
      redis:
        condition: service_healthy
    command: python -m app.worker

volumes:
  postgres_data:
  bundle_cache:
